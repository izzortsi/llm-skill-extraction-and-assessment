profile_name: default
run_dir: llm-skills.extraction-pipeline/data/pipeline-runs/default-profile

# source data (stage 1a)
dataset: wikimedia/wikipedia
subset: 20231101.en
domain: language-skills
max_chunks: 5
chunk_size: 4000
tasks_per_chunk: 2

# extraction model (stages 1b, 3)
extraction_provider: anthropic
extraction_model: claude-opus-4-6

# trace capture (stage 2)
trace_provider: anthropic
trace_model: claude-opus-4-6

# evaluation (stages 5, 8)
config_file: llm-skills.llm-providers/configs/models.yaml
ollama_url: http://localhost:11434/v1
eval_models:
  - qwen2.5-3b
  - qwen2.5-7b
modes:
  - singlecall
  - stepwise
  - guided

# optional API models (stage 5 legacy path)
zai_model: glm-5-turbo
zai_base_url: https://api.z.ai/api/coding/paas/v4
anthropic_eval_model: claude-opus-4-6

# judge (stages 5, 8)
judge_provider: anthropic
judge_model: claude-opus-4-6

# skill extraction (stage 3)
max_skills: 8

# skill composition (stage 4b)
compose_k_values:
  - 2
  - 3
  - 4
  - 5
compose_operators:
  - seq
